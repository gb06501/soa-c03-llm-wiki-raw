name: Wiki navigation

on:
  pull_request:
    paths:
      - "wiki/**"
      - "AGENTS.md"
      - "scripts/validate_wiki_links.py"
      - "scripts/validate_wiki_semantics.py"
      - "scripts/generate_navigation.py"
      - ".github/workflows/wiki-navigation.yml"
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "AGENTS.md"
      - "scripts/validate_wiki_links.py"
      - "scripts/validate_wiki_semantics.py"
      - "scripts/generate_navigation.py"
      - ".github/workflows/wiki-navigation.yml"

permissions:
  contents: read

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated domain and skill views
        run: python3 scripts/generate_navigation.py --check
      - name: Validate complete wiki link graph
        run: python3 scripts/validate_wiki_links.py
      - name: Validate metadata ordering and service framing
        run: python3 scripts/validate_wiki_semantics.py
